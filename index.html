<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QPay App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
}

.app{
    width:100%;
    max-width:420px;
    height:100vh;
    background:#fff;
    position:relative;
    overflow:hidden;
}

/* SCREENS */
.screen{
    display:none;
    padding:25px;
    height:calc(100vh - 70px);
}

.screen.active{
    display:block;
}

/* LOGO */
.logo{
    width:150px;
    height:80px;
    margin:0 auto 20px;
    border-radius:18px;
    background:linear-gradient(135deg,#fff,#f2f2f2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
    position:relative;
    border:1px solid #eee;
}

.logo::before{
    content:"";
    position:absolute;
    left:0;
    width:8px;
    height:100%;
    background:#00c853;
}

.q{color:#00c853;}
.pay{color:#111;}

h2{text-align:center;color:#00a63e;}
p{text-align:center;color:#666;margin-bottom:15px;}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
    transition:0.2s;
}

/* ERROR STYLE */
input.error{
    border:2px solid red;
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
    100%{transform:translateX(0);}
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:#fff;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

/* LOADER */
.loader{
    width:60px;
    height:60px;
    border:6px solid #ddd;
    border-top:6px solid #00c853;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* DASHBOARD */
.card{
    background:linear-gradient(135deg,#00c853,#00e676);
    padding:20px;
    border-radius:15px;
    color:white;
    margin-top:15px;
}

.balance{
    font-size:28px;
    font-weight:bold;
}

/* NAV */
.nav{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    background:#111;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav div{
    color:#aaa;
    font-size:12px;
    text-align:center;
}

.nav div.active{
    color:#00e676;
}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div class="screen active" id="login">
    <div class="logo">
        <span class="q">Q</span><span class="pay">Pay</span>
    </div>

    <h2>Login</h2>
    <p>Enter account</p>

    <input id="user" placeholder="Email / Phone">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- PIN -->
<div class="screen" id="pin">
    <h2>Enter PIN</h2>
    <input id="pinInput" type="password" maxlength="4">
    <button onclick="checkPin()">Continue</button>
</div>

<!-- LOADING -->
<div class="screen" id="load">
    <h2>Verifying...</h2>
    <div class="loader"></div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="home">
    <h2>Welcome, Iremide 👋</h2>

    <div class="card">
        <p>Balance</p>
        <div class="balance">₦10,000</div>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div class="active">🏠<br>Home</div>
    <div>💸<br>Send</div>
    <div>👛<br>Wallet</div>
    <div>👤<br>Profile</div>
</div>

</div>

<script>

function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LOGIN */
function login(){
    let input=document.getElementById("pass");

    if(input.value==="0000"){
        show("pin");
    }else{
        input.classList.add("error");

        setTimeout(()=>{
            input.classList.remove("error");
        },500);

        input.value="";
    }
}

/* PIN */
function checkPin(){
    if(document.getElementById("pinInput").value==="1234"){
        show("load");
        setTimeout(()=>show("home"),2000);
    }else{
        alert("Wrong PIN");
    }
}

</script>

</body>
</html>
