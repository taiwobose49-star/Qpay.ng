<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QPay App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c853,#00e676,#00b248);
}

/* APP */
.app{
    width:100%;
    max-width:420px;
    height:100vh;
    background:#fff;
    position:relative;
    overflow:hidden;
}

/* SCREENS */
.screen{
    display:none;
    padding:25px;
    height:calc(100vh - 70px);
    overflow-y:auto;
}

.screen.active{
    display:block;
}

/* LOGIN */
.logo{
    width:150px;
    height:80px;
    margin:0 auto 20px;
    border-radius:18px;
    background:linear-gradient(135deg,#fff,#d9f0ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
    position:relative;
}

.logo::before{
    content:"";
    position:absolute;
    left:0;
    width:8px;
    height:100%;
    background:#00a8ff;
}

.q{color:#00a8ff;}
.pay{color:#111;}

h2{text-align:center;color:#00a63e;}
p{text-align:center;color:#666;margin-bottom:15px;}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:#fff;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

/* FINGERPRINT */
.fingerprint{
    width:120px;
    height:120px;
    margin:20px auto;
    border-radius:50%;
    border:3px solid #00a8ff;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* LOADER */
.loader{
    width:60px;
    height:60px;
    border:6px solid #ddd;
    border-top:6px solid #00a8ff;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* SUCCESS */
.check{
    width:80px;
    height:80px;
    background:#00c853;
    border-radius:50%;
    margin:20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:40px;
}

/* DASHBOARD */
.card{
    background:linear-gradient(135deg,#00c853,#00e676);
    padding:20px;
    border-radius:15px;
    color:white;
    margin-top:15px;
}

.balance{
    font-size:28px;
    font-weight:bold;
}

/* NAV */
.nav{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    background:#111;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav div{
    color:#aaa;
    font-size:12px;
    text-align:center;
    cursor:pointer;
}

.nav div.active{
    color:#00e676;
}

.icon{display:block;font-size:18px;}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div class="screen active" id="login">
    <div class="logo">
        <span class="q">Q</span><span class="pay">Pay</span>
    </div>

    <h2>Login</h2>
    <p>Enter account</p>

    <input id="user" placeholder="Email / Phone">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- PIN -->
<div class="screen" id="pin">
    <h2>Enter PIN</h2>
    <input id="pinInput" type="password" maxlength="4" placeholder="4-digit PIN">
    <button onclick="checkPin()">Continue</button>
</div>

<!-- FINGERPRINT -->
<div class="screen" id="finger">
    <h2>Fingerprint Unlock</h2>
    <div class="fingerprint"></div>
    <button onclick="loading()">Scan</button>
</div>

<!-- LOADING -->
<div class="screen" id="load">
    <h2>Verifying...</h2>
    <div class="loader"></div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="home">
    <h2>Welcome, Iremide 👋</h2>

    <div class="card">
        <p>Balance</p>
        <div class="balance">₦10,000</div>
    </div>

    <button onclick="sendMoney()">Send Money</button>
</div>

<!-- NAV -->
<div class="nav">
    <div class="active" onclick="go('home')"><span class="icon">🏠</span>Home</div>
    <div onclick="go('home')"><span class="icon">💸</span>Send</div>
    <div onclick="go('home')"><span class="icon">👛</span>Wallet</div>
    <div onclick="go('home')"><span class="icon">👤</span>Profile</div>
</div>

</div>

<script>

function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LOGIN */
function login(){
    let p=document.getElementById("pass").value;
    if(p==="0000"){
        show("pin");
    }else{
        alert("Wrong password (0000)");
    }
}

/* PIN */
function checkPin(){
    if(document.getElementById("pinInput").value==="1234"){
        show("finger");
    }else{
        alert("Wrong PIN");
    }
}

/* FINGER */
function loading(){
    show("load");
    setTimeout(()=>show("home"),2000);
}

/* SEND */
function sendMoney(){
    alert("Money sent successfully ✔️");
}

/* NAV */
function go(id){
    show(id);
}

</script>

</body>
</html>
