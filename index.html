<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c853,#00e676,#00b248);
}

.login-box{
    width:90%;
    max-width:380px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    width:80px;
    height:80px;
    margin:0 auto 15px;
    border-radius:20px;
    background:#00c853;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
}

h1{
    color:#00a63e;
    text-align:center;
    margin-bottom:10px;
    font-size:28px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#777;
    font-size:14px;
}
</style></head><body><div class="login-box"><div class="logo">TG</div>

<h1>Login Into Your Account</h1>

<p class="subtitle">Welcome back</p>

<input type="text" placeholder="Enter your mobile number / Email">

<button onclick="login()">Login</button>

<div class="footer">
    Secure Login Portal
</div>

</div><script>
function login(){
    alert("Login button clicked!");
}
</script></body>
</html>
