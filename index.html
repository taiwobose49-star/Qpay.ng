<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
}

canvas{
    display:block;
}
</style></head>
<body><canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = [];

const tempCanvas = document.createElement("canvas");
const tempCtx = tempCanvas.getContext("2d");

tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;

const fontSize = Math.min(canvas.width / 8, 90);

tempCtx.fillStyle = "#fff";
tempCtx.textAlign = "center";
tempCtx.textBaseline = "middle";
tempCtx.font = `bold ${fontSize}px Arial`;
tempCtx.fillText(
    "HAPPY BIRTHDAY",
    tempCanvas.width / 2,
    tempCanvas.height / 2
);

const imageData = tempCtx.getImageData(
    0,
    0,
    tempCanvas.width,
    tempCanvas.height
);

for(let y = 0; y < tempCanvas.height; y += 5){
    for(let x = 0; x < tempCanvas.width; x += 5){

        const index = (y * tempCanvas.width + x) * 4;

        if(imageData.data[index + 3] > 128){

            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * 800,

                tx: x,
                ty: y,

                size: Math.random() * 3 + 1
            });
        }
    }
}

let angle = 0;

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    angle += 0.01;

    particles.forEach(p=>{

        p.x += (p.tx - p.x) * 0.05;
        p.y += (p.ty - p.y) * 0.05;

        const cos = Math.cos(angle);
        const sin = Math.sin(angle);

        const cx = p.x - canvas.width/2;

        const rx = cx*cos - p.z*sin;
        const rz = cx*sin + p.z*cos;

        const scale = 700 / (700 + rz);

        const drawX = rx * scale + canvas.width/2;
        const drawY = p.y * scale;

        ctx.beginPath();
        ctx.arc(
            drawX,
            drawY,
            p.size * scale,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
        `hsl(${(angle*100 + p.tx)%360},100%,70%)`;

        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script></body>
</html>
